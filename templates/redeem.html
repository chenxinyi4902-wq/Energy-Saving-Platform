<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Points Redemption - Ecopulse</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard">

    <aside>
        <div class="sidebar-logo">
            <h1 class="title-pop">ECOPULSE</h1>
        </div>

        <nav>
            <div class="nav-item interactive-element">
                <i data-lucide="layout-dashboard"></i>
                <a href="{{ url_for('index') }}">Dashboard</a>
            </div>

            <div class="nav-item interactive-element">
                <i data-lucide="activity"></i>
                <a href="{{ url_for('history') }}">Electricity Usage History</a>
            </div>

            <div class="nav-item interactive-element">
                <i data-lucide="trophy"></i>
                <a href="{{ url_for('leaderboard') }}">Community Leaderboard</a>
            </div>

            <div class="nav-item active-nav">
                <i data-lucide="gift"></i>
                <a href="{{ url_for('redemption') }}">Points Redemption</a>
            </div>
        </nav>

        <div class="sidebar-footer">SYSTEM_v2.0.4</div>
    </aside>

    <main>
        <header>
            <div>
                <h2>Points Redemption</h2>
                <p>Redeem your points for rewards and vouchers.</p>
            </div>
        </header>

        <section class="history-table-card">
            <h3 class="card-title" style="text-align: center;">Available Rewards</h3>

            <p style="text-align: center; margin-bottom: 16px;">
                Current Points: <span id="points-earned">0</span>
            </p>

            <p id="redemption-message" style="text-align: center; margin-bottom: 24px;">
                Select a reward to check availability.
            </p>

            <div id="redemption-grid" class="redemption-grid">
                <!-- Reward cards will be rendered by redemption.js -->
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();
    </script>
    <script src="{{ url_for('static', filename='js/redemption.js') }}"></script>
</body>
</html>
