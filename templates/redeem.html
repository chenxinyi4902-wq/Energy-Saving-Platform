<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Points Redemption - Ecopulse</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard">

    <aside>
        <div class="sidebar-logo">
            <h1 class="title-pop">ECOPULSE</h1>
        </div>

        <nav>
            <div class="nav-item interactive-element">
                <i data-lucide="layout-dashboard"></i>
                <a href="{{ url_for('index') }}">Dashboard</a>
            </div>

            <div class="nav-item interactive-element">
                <i data-lucide="activity"></i>
                <a href="{{ url_for('history') }}">Electricity Usage History</a>
            </div>

            <div class="nav-item interactive-element">
                <i data-lucide="trophy"></i>
                <a href="{{ url_for('leaderboard') }}">Community Leaderboard</a>
            </div>

            <div class="nav-item active-nav">
                <i data-lucide="gift"></i>
                <a href="{{ url_for('redeem') }}">Points Redemption</a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <p>Total Points</p>
            <h3 id="sidebar-points">--</h3>
        </div>
    </aside>

    <main>
        <header>
            <div>
                <h2>Points Redemption</h2>
                <p>Redeem your points for rewards and vouchers.</p>
            </div>

            <div class="header-user-info">
                <h3 id="greeting-text">Welcome</h3>
                <p id="header-username">User</p>
                <button id="logout-btn" type="button">Logout</button>
            </div>
        </header>

        <section class="history-table-card">
            <div
                class="redeem-toolbar"
                style="display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;"
            >
                <h3 class="card-title" style="margin: 0;">
                    Current Points: <span id="current-points">--</span>
                </h3>
                <button id="view-history-btn" type="button" class="interactive-element">
                    View History
                </button>
            </div>

            <p id="redemption-message" style="text-align: center; margin-bottom: 24px;">
                Loading rewards...
            </p>

            <div id="redemption-grid" class="redemption-grid">
            </div>
        </section>
    </main>

    <div id="history-overlay" class="target-overlay hidden"></div>

    <div id="history-modal" class="target-modal hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h3 style="margin: 0;">Redemption History</h3>

            <!-- [ADDED] Top-right close button -->
            <button
                id="history-close-icon"
                type="button"
                style="
                    border: none;
                    background: transparent;
                    font-size: 28px;
                    font-weight: 700;
                    cursor: pointer;
                    line-height: 1;
                    padding: 0;
                "
                aria-label="Close history modal"
            >
                ×
            </button>
        </div>

        <p style="margin-bottom: 16px;">View your recent redeemed rewards.</p>

        <div id="history-list"
             style="max-height: 280px; overflow-y: auto; margin-bottom: 20px;"
        >
        </div>

        <div style="display: flex; justify-content: flex-end;">
            <button id="close-history-btn" type="button">Close</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="{{ url_for('static', filename='js/redeem.js') }}"></script>
    <script src="{{ url_for('static', filename='js/logout.js') }}"></script>
</body>
</html>
