<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Page Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecopulse-Energy Saving Platform</title>
</head>

<body>

    <!-- ================= HEADER SECTION ================= -->
    <!-- Top navigation bar of the platform -->
    <header>

        <nav>

            <!-- Website Title -->
            <div>
                <h2>Ecopulse</h2>
            </div>

            <!-- Greeting + Username -->
            <!-- Note: This is a placeholder.
                 The greeting and username will be dynamically updated in future iterations -->
            <div>
                <p>
                    Good Afternoon,
                    <span>Username</span>
                </p>
            </div>

        </nav>

    </header>

    <!-- ================= SIDEBAR SECTION ================= -->
    <!-- Sidebar navigation for core system features -->
    <aside>

        <nav>

            <!-- Main Navigation Menu -->
            <!-- Note: These items will link to different functional modules in future iterations -->
            <ul>
                <li>Dashboard</li>                 <!-- Main control panel -->
                <li>Electricity Usage History</li> <!-- View past records -->
                <li>Community Leaderboard</li>     <!-- Ranking system -->
                <li>Points Redemption</li>         <!-- Reward exchange -->
            </ul>

        </nav>

        <!-- Bottom Section: Total Points -->
        <!-- Note: Points value will be dynamically updated in future iterations -->
        <div>
            <p>Total Points:</p>
            <span>0</span>
        </div>

    </aside>

</body>
</html>
