<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Points Redemption - Ecopulse</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard">

    <aside>
        <div class="sidebar-logo">
            <h1 class="title-pop">ECOPULSE</h1>
        </div>

        <nav>
            <div class="nav-item interactive-element">
                <i data-lucide="layout-dashboard"></i>
                <a href="{{ url_for('index') }}">Dashboard</a>
            </div>

            <div class="nav-item interactive-element">
                <i data-lucide="activity"></i>
                <a href="{{ url_for('history') }}">Electricity Usage History</a>
            </div>

            <div class="nav-item interactive-element">
                <i data-lucide="trophy"></i>
                <a href="{{ url_for('leaderboard') }}">Community Leaderboard</a>
            </div>

            <div class="nav-item active-nav">
                <i data-lucide="gift"></i>
                <a href="{{ url_for('redeem') }}">Points Redemption</a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <p>Total Points</p>
            <h3 id="sidebar-points">--</h3>
        </div>
    </aside>

    <main>
        <header>
            <div>
                <h2>Points Redemption</h2>
                <p>Redeem your points for rewards and vouchers.</p>
            </div>

            <div class="header-user-info">
                <h3 id="greeting-text">Welcome</h3>
                <p id="header-username">User</p>
                <button id="logout-btn" type="button">Logout</button>
            </div>
        </header>

        <section class="history-table-card">
            <div class="redeem-toolbar">
                <div>
        <p class="current-points-label">Current Points</p>
        <p class="current-points-value"><span id="current-points">--</span></p>
    </div>
    <button id="view-history-btn" class="view-history-btn">View History</button>
</div>

            <p id="redemption-message">
                Loading rewards...
            </p>

            <div id="redemption-grid" class="redemption-grid">
            </div>
        </section>
    </main>
    <div id="history-overlay" class="modal-overlay hidden">
        <div id="history-modal" class="modal-box hidden">
            <div class="modal-header">
                <h3>Redemption History</h3>
                <button id="history-close-icon" class="modal-close">&times;</button>
            </div>
            <div id="history-list" class="modal-body">
                Loading...
            </div>
            <div style="padding: 1.5rem; border-top: 4px solid #000; text-align: right; background: #fff;">
                <button id="close-history-btn" class="view-history-btn">Close</button>
            </div>
        </div>
    </div>

    
    <script>
        lucide.createIcons();
    </script>
    <script src="{{ url_for('static', filename='js/redeem.js') }}"></script>
    <script src="{{ url_for('static', filename='js/logout.js') }}"></script>
</body>
</html>
